services:
  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: development
      PYTHONUNBUFFERED: "1"
    working_dir: /app
    volumes:
      - ./backend:/app:cached
    command: uv run uvicorn app.main:create_app --factory --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    expose:
      - "8000"
    networks:
      - appnet

  frontend:
    build:
      context: ./frontend
    working_dir: /app
    volumes:
      - ./frontend:/app:cached
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
    command: npm run dev -- --host 0.0.0.0 --port 3000
    ports:
      - "3000:3000"
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - appnet

networks:
  appnet:
    driver: bridge
