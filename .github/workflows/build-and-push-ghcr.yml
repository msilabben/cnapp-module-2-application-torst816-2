name: Docker Build to GHCR

on:
  workflow_call:
    inputs:
      image-name:
        required: true
        type: string
      context:
        required: true
        type: string
      dockerfile:
        required: false
        type: string
        default: Dockerfile
      environment:
        required: true
        type: string
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  publish:
    name: Publish ${{ inputs.image-name }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}  

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.ACR_NAME }}.azurecr.io/${{ inputs.image-name }}
          tags: |
            type=match,pattern=${{ inputs.image-name }}@v(.*),group=1
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and publish image
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.context }}/${{ inputs.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6

      - name: Generate image SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          image: ghcr.io/msilabben/${{ inputs.image-name }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom-${{ inputs.image-name }}.spdx.json
          upload-artifact: false

      - name: Sign published image digest
        run: cosign sign --yes ghcr.io/msilabben/${{ inputs.image-name }}@${{ steps.build.outputs.digest }}

      - name: Attest image SBOM
        run: |
          cosign attest \
            --yes \
            --predicate sbom-${{ inputs.image-name }}.spdx.json \
            --type spdxjson \
            ghcr.io/msilabben/${{ inputs.image-name }}@${{ steps.build.outputs.digest }}

      - name: Write publish summary
        run: |
          {
            echo "### Published image"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Image | ghcr.io/msilabben/${{ inputs.image-name }} |"
            echo "| Tag | ${{ matrix.image.version }} |"
            echo "| Digest | ${{ steps.build.outputs.digest }} |"
            echo "| Pinned reference | ghcr.io/msilabben/${{ inputs.image-name }}@${{ steps.build.outputs.digest }} |"
            echo "| Upstream image | ${{ inputs.image-upstream }} |"
            echo "| Source directory | ${{ inputs.context }} |"
            echo "| SBOM | attached as a signed Cosign attestation |"
          } >> "$GITHUB_STEP_SUMMARY"