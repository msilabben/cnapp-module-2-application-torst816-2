name: pull request
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  security-events: write
  packages: read

jobs:
  pre-commit:
    if: false # Remove this to enable pre-commit
    runs-on: ubuntu-22.04
    name: Run pre-commit
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v3
    - uses: pre-commit/action@v3.0.1

  gitleaks:
    if: false # Remove this to enable gitleaks
    uses: ./.github/workflows/gitleaks.yml

  backend-tests:
    if: false # Remove this to enable pytest
    uses: ./.github/workflows/pytest.yml
    with:
      working-directory: backend
      python-version: "3.11"


  semgrep:
    if: true # Remove this to enable SAST with semgrep
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/msilabben/semgrep:sha256-da164ad269e6f61d744b6cfabe852175f93f77f22db88483a67154c7310ddb1c
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: semgrep scan --sarif --sarif-output=semgrep_results.sarif

      - name: Upload Semgrep SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: semgrep_results.sarif

      - name: Upload Semgrep SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep_results.sarif
          category: semgrep

  trivy:
    if: true # Remove this to enable SAST/SCA with trivy
    runs-on: ubuntu-22.04
    container:
      image: aquasec/trivy:0.70.0
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy
        run: trivy fs --format sarif -o trivy_results.sarif --scanners vuln,config,secret,license .

      - name: Upload Trivy SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy_results.sarif

      - name: Upload Trivy SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy_results.sarif
          category: trivy

  opa:
    if: true # Remove this to enable Policy as Code (PaC) with Open Policy Agent
    needs: [semgrep, trivy]
    runs-on: ubuntu-22.04
    container:
      image: openpolicyagent/conftest:v0.59.0
    steps:
      - uses: actions/checkout@v4

      - name: Download SARIF artifacts
        uses: actions/download-artifact@v4

      - name: Verify Semgrep findings
        run: conftest test semgrep-results/semgrep_results.sarif --parser json --policy policy/semgrep.rego

      - name: Verify Trivy findings
        run: conftest test trivy-results/trivy_results.sarif --parser json --policy policy/trivy.rego

      - name: Verify NPM findings
        run: conftest test npm-results/npm_results.sarif --parser json --policy policy/npm.rego

