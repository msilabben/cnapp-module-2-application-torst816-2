name: license review

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  issues: write

jobs:
  ort_scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Run OSS Review Toolkit
        uses: oss-review-toolkit/ort-ci-github-action@086d928d24ef1653dc0777296b312fda5faaaf52
        with:
          run: "analyzer,scanner,evaluator,reporter"
