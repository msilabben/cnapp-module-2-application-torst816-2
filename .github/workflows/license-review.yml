name: license review

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  issues: write

jobs:
  ort:
    name: Run ORT license review
    runs-on: ubuntu-22.04

    env:
      ORT_IMAGE: ghcr.io/oss-review-toolkit/ort-minimal:89.0.0
      ORT_RESULTS_DIR: ort-results
      ORT_ISSUE_TITLE: "Scheduled license review findings"

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Prepare ORT result directories
        run: |
          mkdir -p \
            "${ORT_RESULTS_DIR}/analyzer" \
            "${ORT_RESULTS_DIR}/scanner" \
            "${ORT_RESULTS_DIR}/evaluator" \
            "${ORT_RESULTS_DIR}/reporter"

          chmod -R 777 "${ORT_RESULTS_DIR}"

      - name: Prepare project permissions for ORT
        run: |
          chmod -R a+rwX frontend

      - name: Run ORT analyzer
        id: analyzer
        continue-on-error: true
        run: |
          docker run --rm \
            --volume "$PWD:/project" \
            --volume "$PWD/ort-config:/home/ort/.ort/config:ro" \
            --volume "$PWD/${ORT_RESULTS_DIR}/analyzer:/out" \
            "${ORT_IMAGE}" \
            analyze \
            --input-dir /project \
            --output-dir /out \
            --output-formats JSON,YAML

      - name: Run ORT scanner
        id: scanner
        if: hashFiles('ort-results/analyzer/analyzer-result.yml') != ''
        continue-on-error: true
        run: |
          docker run --rm \
            --volume "$PWD:/project" \
            --volume "$PWD/ort-config:/home/ort/.ort/config:ro" \
            --volume "$PWD/${ORT_RESULTS_DIR}/scanner:/out" \
            "${ORT_IMAGE}" \
            scan \
            --ort-file /project/${ORT_RESULTS_DIR}/analyzer/analyzer-result.yml \
            --output-dir /out \
            --output-formats JSON,YAML

      - name: Run ORT evaluator
        id: evaluator
        if: hashFiles('ort-results/scanner/scan-result.yml') != ''
        continue-on-error: true
        run: |
          docker run --rm \
            --volume "$PWD:/project" \
            --volume "$PWD/ort-config:/home/ort/.ort/config:ro" \
            --volume "$PWD/${ORT_RESULTS_DIR}/evaluator:/out" \
            "${ORT_IMAGE}" \
            evaluate \
            --ort-file /project/${ORT_RESULTS_DIR}/scanner/scan-result.yml \
            --output-dir /out \
            --output-formats JSON,YAML

      - name: Run ORT reporter
        if: always() && (
          hashFiles('ort-results/evaluator/evaluation-result.yml') != '' ||
          hashFiles('ort-results/scanner/scan-result.yml') != '' ||
          hashFiles('ort-results/analyzer/analyzer-result.yml') != ''
          )
        env:
          EVALUATOR_RESULT_HASH: ${{ hashFiles('ort-results/evaluator/evaluation-result.yml') }}
          SCANNER_RESULT_HASH: ${{ hashFiles('ort-results/scanner/scan-result.yml') }}
          ANALYZER_RESULT_HASH: ${{ hashFiles('ort-results/analyzer/analyzer-result.yml') }}
        run: |
          if [ -n "${EVALUATOR_RESULT_HASH}" ]; then
            ORT_INPUT_FILE="/project/${ORT_RESULTS_DIR}/evaluator/evaluation-result.yml"
          elif [ -n "${SCANNER_RESULT_HASH}" ]; then
            ORT_INPUT_FILE="/project/${ORT_RESULTS_DIR}/scanner/scan-result.yml"
          elif [ -n "${ANALYZER_RESULT_HASH}" ]; then
            ORT_INPUT_FILE="/project/${ORT_RESULTS_DIR}/analyzer/analyzer-result.yml"
          fi

          docker run --rm \
            --volume "$PWD:/project" \
            --volume "$PWD/ort-config:/home/ort/.ort/config:ro" \
            --volume "$PWD/${ORT_RESULTS_DIR}/reporter:/out" \
            "${ORT_IMAGE}" \
            report \
            --ort-file "${ORT_INPUT_FILE}" \
            --output-dir /out \
            --report-formats WebApp,StaticHtml,PlainTextTemplate

      - name: Upload ORT reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ort-license-review
          path: ort-results/

      - name: Create issue body
        if: always() && (steps.analyzer.outcome == 'failure' || steps.scanner.outcome == 'failure' || steps.evaluator.outcome == 'failure')
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          sed "s|{{RUN_URL}}|${RUN_URL}|g" \
            .github/issue-templates/license-review.md > issue-body.md

      - name: Create or update license review issue
        if: always() && (steps.analyzer.outcome == 'failure' || steps.scanner.outcome == 'failure' || steps.evaluator.outcome == 'failure')
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_TITLE: ${{ env.ORT_ISSUE_TITLE }}
          ISSUE_LABELS: license-compliance,needs-review
        run: |
          issue_number="$(
            gh issue list \
              --state open \
              --label license-compliance \
              --search "${ISSUE_TITLE} in:title" \
              --json number,title \
              --jq ".[] | select(.title == \"${ISSUE_TITLE}\") | .number" \
              | head -n 1
          )"

          if [ -n "${issue_number}" ]; then
            gh issue edit "${issue_number}" --body-file issue-body.md
          else
            gh issue create \
              --title "${ISSUE_TITLE}" \
              --body-file issue-body.md \
              --label "${ISSUE_LABELS}"
          fi